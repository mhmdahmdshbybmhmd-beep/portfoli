<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>السلة</title>
  <link rel="stylesheet" href="css/styje.css" />
  <link rel="stylesheet" href="css/products.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <header>
    <h1>متجري الإلكتروني</h1>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html">السلة</a>
      <a href="contact.html">اتصل بنا</a>
    </nav>
  </header>

  <main class="page-content">
    <section class="page-heading">
      <h2>سلة التسوق</h2>
      <p>راجع العناصر التي أضفتها إلى السلة.</p>
    </section>

    <section class="cart-layout">
      <div class="cart-items">
        <div class="product-card cart-item">
          <h3>لابتوب</h3>
          <p>1 x 25,000 ريال</p>
          <button type="button" class="add-btn">حذف</button>
        </div>

        <div class="product-card cart-item">
          <h3>هاتف ذكي</h3>
          <p>1 x 9,999 ريال</p>
          <button type="button" class="add-btn">حذف</button>
        </div>
      </div>

      <aside class="cart-summary">
        <h3>ملخص الطلب</h3>
        <p>الإجمالي: 34,999 ريال</p>
        <button type="button" class="add-btn">إتمام الشراء</button>
      </aside>
    </section>
  </main>

  <script src="js/cart.js"></script>
</body>
</html>
