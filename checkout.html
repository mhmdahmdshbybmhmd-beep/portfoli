<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إتمام الدفع</title>
  <link rel="stylesheet" href="css/styje.css" />
  <link rel="stylesheet" href="css/products.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <header>
    <h1>متجري الإلكتروني</h1>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html">السلة</a>
      <a href="contact.html">اتصل بنا</a>
    </nav>
  </header>

  <main class="page-content">
    <section class="page-heading">
      <h2>إتمام الدفع</h2>
      <p>أدخل بياناتك لاستكمال عملية الشراء.</p>
    </section>

    <section class="checkout-layout">
      <form class="checkout-form">
        <label>الاسم الكامل</label>
        <input type="text" placeholder="أدخل اسمك" />

        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="example@mail.com" />

        <label>العنوان</label>
        <textarea rows="3" placeholder="أدخل عنوان التوصيل"></textarea>

        <label>طريقة الدفع</label>
        <select>
          <option>بطاقة ائتمان</option>
          <option>الدفع عند الاستلام</option>
          <option>Apple Pay</option>
        </select>

        <button type="submit" class="add-btn">تأكيد الشراء</button>
      </form>

      <aside class="cart-summary">
        <h3>ملخص الطلب</h3>
        <p>الإجمالي: 34,999 ريال</p>
        <p>الشحن: مجاني</p>
      </aside>
    </section>
  </main>

  <script src="js/checkout.js"></script>
</body>
</html>
